<div class="max-w-xl mx-auto mt-8 bg-white shadow-lg rounded-lg p-6 space-y-4">

  <div class="flex flex-col">
    <label class="text-sm font-semibold text-gray-600" for="campo-nome">
      Nome
    </label>
    <input 
      id="campo-nome"
      type="text"
      [(ngModel)]="nome"
      class="border rounded-md p-2 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-400"
    >
  </div>

  <div class="flex flex-col">
    <label class="text-sm font-semibold text-gray-600" for="campo-quantidade">
      Quantidade
    </label>
    <input 
      id="campo-quantidade"
      type="number"
      [(ngModel)]="quantidade"
      class="border rounded-md p-2 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-400"
    >
  </div>

  <div class="flex flex-col">
    <label class="text-sm font-semibold text-gray-600" for="campo-valor">
      Valor
    </label>
    <input 
      id="campo-valor"
      type="number"
      [(ngModel)]="valor"
      class="border rounded-md p-2 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-400"
    >
  </div>

  <button 
    class="w-full bg-blue-500 text-white py-2 rounded-md hover:bg-blue-600 transition"
    (click)="salvar()">
    Salvar
  </button>

</div>

<ul class="max-w-xl mx-auto mt-6 space-y-3">
    @if(produtos.length === 0){
      <strong class="block text-center text-gray-500">
        Nenhum produto cadastrado
      </strong>
    } @else {
  
    @for(produto of produtos; let i = $index; track produto){
      <li class="flex items-center justify-between bg-white shadow-md rounded-lg p-3">
  
        <strong class="text-blue-600">
          {{produto}} | Quantidade: {{quantidades[i]}} | R$: {{valores[i]}}
        </strong>
  
        <div class="flex gap-2">
          <button 
            class="text-yellow-500 hover:text-yellow-600 transition"
            (click)="preencherCamposParaEditar(produto, quantidades[i], valores[i])">
            <i class="fa-solid fa-pencil"></i>
          </button>
  
          <button 
            class="text-red-500 hover:text-red-600 transition"
            (click)="apagar(produto, quantidades[i], valores[i])">
            <i class="fa-solid fa-trash"></i>
          </button>
        </div>
  
      </li>
    }
    }
  </ul>
